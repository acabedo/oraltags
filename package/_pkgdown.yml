url: https://acabedo.github.io/oraltags/

destination: ../docs

lang: en

template:
  bootstrap: 5
  bslib:
    primary: "#c2410c"

home:
  title: "Oraltags — oral data tagger & prosody explorer"
  description: >
    Shiny app for annotating oral corpora, computing prosodic metrics
    (F0, intensity, speech rate) and measuring inter-annotator agreement.
    Aplicación Shiny para anotar corpus orales, calcular métricas prosódicas
    y medir el acuerdo entre jueces.

navbar:
  structure:
    left: [intro, articles, reference]
    right: [search, github]
  components:
    articles:
      text: Docs / Documentación
      menu:
        - text: "🇬🇧 English"
        - text: Getting started
          href: articles/oraltags.html
        - text: Complete guide to the application
          href: articles/app-guide.html
        - text: Variables and files (inputs and outputs)
          href: articles/variables-and-files.html
        - text: Using oraltags from R (code)
          href: articles/using-r.html
        - text: "---"
        - text: "🇪🇸 Español"
        - text: Primeros pasos
          href: articles/primeros-pasos.html
        - text: Guía completa de la aplicación
          href: articles/guia-aplicacion.html
        - text: Variables y archivos (entradas y salidas)
          href: articles/variables-y-archivos.html
        - text: Uso desde R (código del paquete)
          href: articles/uso-con-r.html
    github:
      icon: fab fa-github
      href: https://github.com/acabedo/oraltags
      aria-label: GitHub

articles:
  - title: "🇬🇧 English"
    navbar: ~
    contents:
      - oraltags
      - app-guide
      - variables-and-files
      - using-r
  - title: "🇪🇸 Español"
    navbar: ~
    contents:
      - primeros-pasos
      - guia-aplicacion
      - variables-y-archivos
      - uso-con-r

reference:
  - title: Exported functions / Funciones exportadas
    desc: >
      The package exports two functions; the rest of the functionality lives
      in the Shiny interface launched with run_app(). El paquete exporta dos
      funciones; el resto vive en la interfaz Shiny que se lanza con run_app().
    contents:
      - run_app
      - oraltags_data_dir
