name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testthat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install test dependencies
        shell: Rscript {0}
        run: install.packages(c("testthat", "jsonlite"))

      - name: Run testthat suite
        shell: Rscript {0}
        run: testthat::test_dir("tests/testthat", stop_on_failure = TRUE)

      - name: Check the app parses
        shell: Rscript {0}
        run: invisible(parse("etiquetador_oral.R")); cat("PARSE OK\n")
